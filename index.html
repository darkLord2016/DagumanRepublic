<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Website in Progress - Daguman Republic</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
    }

    body {
      font-family: 'DM Sans', system-ui, -apple-system, sans-serif;
      background-color: #FAFAFA;
      color: #1A1A1A;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }

    main {
      text-align: center;
      max-width: 480px;
    }

    .headline {
      font-size: clamp(2rem, 5vw, 2.75rem);
      font-weight: 500;
      letter-spacing: -0.02em;
      color: #1A1A1A;
      line-height: 1.2;
    }

    .dots span {
      display: inline-block;
      animation: blink 1.4s infinite both;
      opacity: 0;
    }

    .dots span:nth-child(1) { animation-delay: 0s; }
    .dots span:nth-child(2) { animation-delay: 0.2s; }
    .dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes blink {
      0%, 80%, 100% { opacity: 0; }
      40%            { opacity: 1; }
    }

    .subline {
      margin-top: 1.25rem;
      font-size: 1rem;
      font-weight: 400;
      color: #6B6B6B;
      line-height: 1.6;
    }

    .divider {
      width: 40px;
      height: 2px;
      background-color: #E0E0E0;
      margin: 2rem auto;
      border: none;
    }

    footer {
      position: fixed;
      bottom: 2rem;
      left: 0;
      right: 0;
      text-align: center;
      font-size: 0.8rem;
      color: #BBBBBB;
      letter-spacing: 0.01em;
    }
  </style>
</head>
<body>

  <main>
    <h1 class="headline">
      Website in Progress<span class="dots"><span>.</span><span>.</span><span>.</span></span>
    </h1>
    <hr class="divider" />
    <p class="subline">Something great is on its way. Check back soon.</p>
  </main>

  <footer>
    &copy; 2026 Daguman Republic. All rights reserved.
  </footer>

</body>
</html>
